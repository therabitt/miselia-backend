# ═════════════════════════════════════════════════════════════════════════════
# File    : alembic.ini
# Desc    : Alembic configuration. sqlalchemy.url dikosongkan — dimuat
#           secara dinamis dari settings di alembic/env.py.
# Step    : STEP 5 — Alembic Setup & Migration Files
# Ref     : Blueprint §2.2, Appendix D
# ═════════════════════════════════════════════════════════════════════════════

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# URL dikosongkan — dimuat dari settings.async_database_url di env.py
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
